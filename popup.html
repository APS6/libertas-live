<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <style>
            :root {
                color-scheme: dark;
            }

            body {
                width: 320px;
                margin: 0;
                padding: 18px;
                font-family: "Segoe UI", Tahoma, sans-serif;
                background: #0b0d10;
                color: #f3f3f3;
            }

            h1 {
                font-size: 17px;
                margin: 0 0 8px 0;
            }

            .brand {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 10px;
            }

            .brand img {
                width: 28px;
                height: 28px;
                border-radius: 6px;
            }

            .subtitle {
                margin: 6px 0 16px;
                color: #b0b7c2;
                font-size: 12px;
            }

            .card {
                background: #14181f;
                border: 1px solid #262c38;
                border-radius: 10px;
                padding: 12px;
                margin-bottom: 12px;
            }

            .label {
                display: block;
                font-size: 13px;
                font-weight: 600;
                margin-bottom: 6px;
            }

            .hint {
                font-size: 11px;
                color: #9ea7b5;
                margin-top: 6px;
                line-height: 1.35;
            }

            select,
            input[type="range"] {
                width: 100%;
            }

            select,
            input[type="number"] {
                background: #0e1218;
                color: #f3f3f3;
                border: 1px solid #384053;
                border-radius: 8px;
                width: 90%;
                padding: 8px 4px 8px 4px;
                font-size: 13px;
            }

            button {
                background: #4f85ff;
                color: #fff;
                border: none;
                border-radius: 8px;
                padding: 8px 10px;
                font-size: 12px;
                cursor: pointer;
                width: 100%;
            }

            button.secondary {
                background: #2c3341;
            }

            .row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
            }

            .toggle {
                position: relative;
                width: 42px;
                height: 24px;
            }

            .toggle input {
                opacity: 0;
                width: 0;
                height: 0;
            }

            .slider {
                position: absolute;
                inset: 0;
                background: #566074;
                border-radius: 999px;
                transition: 0.2s;
            }

            .slider::before {
                content: "";
                position: absolute;
                height: 18px;
                width: 18px;
                left: 3px;
                top: 3px;
                background: #fff;
                border-radius: 50%;
                transition: 0.2s;
            }

            .toggle input:checked + .slider {
                background: #4f85ff;
            }

            .toggle input:checked + .slider::before {
                transform: translateX(18px);
            }

            .volume-wrap {
                margin-top: 10px;
            }

            .volume-value {
                margin-top: 4px;
                text-align: right;
                font-size: 12px;
                color: #c7ced8;
            }
        </style>
    </head>
    <body>
        <div class="brand">
            <img src="icons/icon32.png" alt="Libertas logo" />
            <h1>Libertas Live</h1>
        </div>

        <div class="card">
            <label class="label" for="audioMode">Break audio</label>
            <select id="audioMode">
                <option value="mute">Muted</option>
                <option value="volume">Set volume</option>
            </select>

            <div id="volumeWrap" class="volume-wrap" hidden>
                <input
                    id="adVolume"
                    type="range"
                    min="0"
                    max="100"
                    step="1"
                    value="15"
                />
                <div id="volumeValue" class="volume-value">15%</div>
            </div>
            <div class="hint">Choose full mute or a fixed volume level.</div>
        </div>

        <div class="card">
            <div class="row">
                <div>
                    <div class="label">Scorecard overlay</div>
                    <div class="hint">Disable to keep playback visible.</div>
                </div>
                <label class="toggle" aria-label="Toggle scorecard overlay">
                    <input id="overlayEnabled" type="checkbox" checked />
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="card">
            <label class="label" for="aggressiveness">Timing preset</label>
            <select id="aggressiveness">
                <option value="relaxed">Relaxed (-100ms)</option>
                <option value="normal">Normal (+300ms)</option>
                <option value="aggressive">Aggressive (+690ms)</option>
                <option value="super_aggressive">Super Aggressive (+1s)</option>
            </select>
            <div class="hint" id="presetHint"></div>
        </div>

        <div id="devTools" class="card" hidden>
            <label class="label" for="testDuration">Testing tools</label>
            <input
                id="testDuration"
                type="number"
                min="1"
                max="300"
                step="1"
                value="8"
            />
            <div class="row" style="margin-top: 10px">
                <button id="testStart" type="button">Start fake break</button>
                <button id="testEnd" type="button" class="secondary">
                    End fake ad
                </button>
            </div>
            <div class="hint" id="testStatus">
                Dev-only: simulate ad start/end on the active Hotstar tab.
            </div>
        </div>

        <script src="popup.js"></script>
    </body>
</html>
