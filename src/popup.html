<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <style>
            body {
                width: 320px;
                padding: 20px;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                margin: 0;
                max-height: 600px;
                overflow-y: auto;
                background-color: #000000;
            }

            h1 {
                font-size: 18px;
                margin: 0 0 15px 0;
                color: #ffffff;
            }

            .customize-btn {
                background: #ffffff;
                color: black;
                border: none;
                padding: 12px 20px;
                border-radius: 6px;
                font-size: 14px;
                cursor: pointer;
                width: 100%;
                transition: background-color 0.2s;
            }

            .customize-btn:hover {
                background: #f5f5f5;
            }

            .customize-btn:active {
                background: #2c5aa0;
            }

            .description {
                font-size: 13px;
                color: #d5d5d5;
                margin-bottom: 15px;
                line-height: 1.4;
            }

            .mods-section {
                margin-top: 20px;
                border-top: 1px solid #e0e0e0;
                padding-top: 15px;
            }

            .mods-title {
                font-size: 14px;
                font-weight: 600;
                margin-bottom: 10px;
                color: #ffffff;
            }

            .mod-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px 0;
                border-bottom: 1px solid #707070;
                transition: opacity 0.3s;
            }

            .mod-item.disabled {
                opacity: 0.6;
            }

            .mod-item:last-child {
                border-bottom: none;
            }

            .mod-info {
                flex: 1;
                margin-right: 10px;
            }

            .mod-name {
                font-size: 14px;
                font-weight: 500;
                color: #ffffff;
                margin-bottom: 3px;
                transition: color 0.3s;
                word-wrap: break-word;
                max-width: 200px;
            }

            .mod-item.disabled .mod-name {
                color: #999;
            }

            .mod-type {
                font-size: 11px;
                color: #666;
                text-transform: capitalize;
                letter-spacing: 0.3px;
                transition: color 0.3s;
                line-height: 1.3;
            }

            .mod-item.disabled .mod-type {
                color: #bbb;
            }

            .mod-type.default {
                color: #4285f4;
            }

            .mod-type.page-specific {
                color: #34a853;
            }

            .toggle-switch {
                position: relative;
                width: 40px;
                height: 20px;
                background-color: #ccc;
                border-radius: 20px;
                cursor: pointer;
                transition: background-color 0.3s;
            }

            .toggle-switch.active {
                background-color: rgb(174, 226, 111);
            }

            .toggle-slider {
                position: absolute;
                top: 2px;
                left: 2px;
                width: 16px;
                height: 16px;
                background-color: white;
                border-radius: 50%;
                transition: transform 0.3s;
            }

            .toggle-switch.active .toggle-slider {
                transform: translateX(20px);
            }

            .mod-path-link {
                cursor: pointer;
                text-decoration: underline;
                transition: color 0.2s;
            }

            .mod-path-link:hover {
                color: #2c5aa0;
            }

            .mod-type.default .mod-path-link {
                color: #4285f4;
            }

            .mod-type.default .mod-path-link:hover {
                color: #3367d6;
            }

            .no-mods {
                text-align: center;
                padding: 20px;
                color: #666;
                font-size: 13px;
                font-style: italic;
                background: #f9f9f9;
                border-radius: 6px;
                margin: 10px 0;
            }

            .loading {
                text-align: center;
                padding: 10px;
                color: #666;
                font-size: 12px;
            }
        </style>
    </head>
    <body>
        <h1>Libertas Live - Better cricket for everyone</h1>
        <p class="description">To save humanity!!!!</p>
        <script src="popup.js"></script>
    </body>
</html>
